routes:
  # Create batch
  - path: /v1/batches
    method: POST
    request_filters:
      - name: rate-limit
      - name: auth
      - name: context
      - name: context-batch
      - name: openai-compatible-director
      - name: set-response-chunk-splitter
    response_filters:
      - name: json-no-unicode

  # List batches
  - path: /v1/batches
    method: GET
    request_filters:
      - name: rate-limit
      - name: auth
      - name: context
      - name: context-batch
      - name: openai-compatible-director
      - name: set-response-chunk-splitter
    response_filters:
      - name: json-no-unicode

  # Retrieve batch
  - path: /v1/batches/{batch_id}
    method: GET
    request_filters:
      - name: rate-limit
      - name: auth
      - name: context
      - name: context-batch
      - name: openai-compatible-director
      - name: set-response-chunk-splitter
    response_filters:
      - name: json-no-unicode

  # Cancel batch
  - path: /v1/batches/{batch_id}/cancel
    method: POST
    request_filters:
      - name: rate-limit
      - name: auth
      - name: context
      - name: context-batch
      - name: openai-compatible-director
      - name: set-response-chunk-splitter
    response_filters:
      - name: json-no-unicode
