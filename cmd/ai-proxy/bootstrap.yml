gorilla-mux@ai:
  addr: :8081

grpc-server@ai:
  addr: ":8082"

erda.app.reverse-proxy:
  log_level: ${LOG_LEVEL:info}
  model_retry:
    enabled: ${AI_PROXY_MODEL_RETRY_ENABLED:true}
    conditions:
      max_llm_backend_request_count: ${AI_PROXY_MODEL_RETRY_MAX_LLM_BACKEND_REQUEST_COUNT:3}
      backoff:
        base: ${AI_PROXY_MODEL_RETRY_BACKOFF_BASE:1s}
        max: 10s
      retryable_http_statuses: [429, 502, 503, 504] # env override: AI_PROXY_MODEL_RETRY_RETRYABLE_HTTP_STATUSES=429,502,503,504
      match_network_issue_from_response_body: ${AI_PROXY_MODEL_RETRY_MATCH_NETWORK_ISSUE_FROM_RESPONSE_BODY:false}
    actions:
      # Retry layer only: when true, a failed instance is excluded from later attempts of the same request.
      # This does not control model_health. If model_health is enabled, the failed instance may already be
      # filtered out by health state before the next attempt, even when exclude_failed_instance=false.
      exclude_failed_instance: ${AI_PROXY_MODEL_RETRY_EXCLUDE_FAILED_INSTANCE:true}
    observability:
      response_header_meta: true

erda.app.ai-proxy:
  log_level: ${LOG_LEVEL:info}
  mcp_proxy_public_url: ${MCP_PROXY_PUBLIC_URL}
  lb_state_store_type: ${LB_STATE_STORE_TYPE:memory} # memory / redis / etcd
  lb_state_store_sticky_ttl: ${LB_STATE_STORE_STICKY_TTL:10m}
  blacklist_user_agent:
    client_token:
      blacklist_str: ${AI_PROXY_BLACKLIST_USER_AGENT_FOR_CLIENT_TOKEN:openclaw,codex,cursor} # comma-separated: openclaw, codex, cursor
    client:
      blacklist_str: ${AI_PROXY_BLACKLIST_USER_AGENT_FOR_CLIENT:openclaw,codex,cursor} # comma-separated: openclaw, codex, cursor
  model_health:
    enabled: ${MODEL_HEALTH_ENABLED:true}
    probe:
      base_url: ${MODEL_HEALTH_PROBE_BASE_URL:http://127.0.0.1:8081}
      timeout: ${MODEL_HEALTH_PROBE_TIMEOUT:10s}
      unhealthy_ttl: ${MODEL_HEALTH_UNHEALTHY_TTL:1h}
    rescue:
      initial_backoff: ${MODEL_HEALTH_RESCUE_INITIAL_BACKOFF:3s}
      max_backoff: ${MODEL_HEALTH_RESCUE_MAX_BACKOFF:2m}

gorm.v2:
  debug: ${MYSQL_DEBUG:false}

erda.apps.ai-proxy.dao:

# gRPC clients
grpc-client@erda.core.openapi.dynamic_register:
  addr: ${ERDA_SERVER_GRPC_ADDR:erda-server:8096}
  block: false
erda.core.openapi.dynamic_register-client: { }
